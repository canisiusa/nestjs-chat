name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (pack only, no publish)'
        required: false
        default: 'false'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG=$(node -p "require('./packages/sdk/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Generate Prisma client
        run: pnpm --filter nestjs-chat prisma:generate

      - name: Lint + typecheck + test
        run: |
          pnpm -r lint
          pnpm --filter nestjs-chat typecheck
          pnpm --filter nestjs-chat test

      - name: Build
        run: pnpm --filter nestjs-chat build

      - name: Publish to npm
        if: github.event.inputs.dry-run != 'true'
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Dry-run pack
        if: github.event.inputs.dry-run == 'true'
        working-directory: packages/sdk
        run: npm publish --dry-run --access public

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry-run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
